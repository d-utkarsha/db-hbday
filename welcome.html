<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DB HBD 💛</title>

    <!-- Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="welcome.css">

</head>

<body>

    <!-- BLUSH -->

    <div class="mouse-blush"></div>

    <!-- Main Glass Card -->

    <div class="hero-card">

        <p class="top-line">
            for a special person
        </p>

        <h1>
            Dhanvi Bhat
        </h1>

        <p class="turns-text">
            You turned 20!
        </p>

        <p class="sub-text">
            Some people bring colour into life effortlessly ✨
        </p>

    </div>

    <!-- OUTSIDE THE BOX -->

    <div class="question-section">

        <h2>
            Are You Ready?
        </h2>


        <div class="btn-wrapper"
             id="playArea">

            <button class="yes-btn"
                    onclick="openCake()">

                Yes 💖

            </button>

            <button class="no-btn"
                    id="noBtn">

                No 🙈

            </button>

        </div>

    </div>

    <audio id="bgMusic"
       loop>

  <source src="music/verification.mp3"
          type="audio/mpeg">

</audio>

    <!-- JS -->

    <script src="welcome.js"></script>
    <div class="page-transition"></div>
</body>

</html>
