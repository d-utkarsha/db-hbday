<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>DB HBD 💛</title>

  <link rel="stylesheet" href="login.css">

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&display=swap"
        rel="stylesheet">

</head>

<body>

  <!-- Background -->

  <div class="gradient-bg"></div>

  <!-- Side Light Streaks -->

  <div class="streak streak1"></div>
  <div class="streak streak2"></div>

  <!-- Ambient Glow -->

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <!-- Ribbon Curves -->

  <div class="curve curve1"></div>
  <div class="curve curve2"></div>

  <!-- Hanging Stars -->

  <div class="hanging hanging1">
    <span>✦</span>
  </div>

  <div class="hanging hanging2">
    <span>✦</span>
  </div>

  <div class="hanging hanging3">
    <span>✦</span>
  </div>

  <!-- Floating Dust -->

  <div class="dust d1"></div>
  <div class="dust d2"></div>
  <div class="dust d3"></div>
  <div class="dust d4"></div>
  <div class="dust d5"></div>
  <div class="dust d6"></div>
  <div class="dust d7"></div>
  <div class="dust d8"></div>

  <!-- Side Glow Orbs -->

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- Tiny Stars -->

  <div class="starry s1">✦</div>
  <div class="starry s2">✦</div>
  <div class="starry s3">✦</div>

  <!-- Mouse Glow -->

  <div class="mouse-blur"></div>

  <!-- Cursor Glow -->

  <div class="cursor-glow"></div>

  <!-- Popup -->

  <div class="intro-popup">

    <p>
      A little magical surprise for someone special ✨
    </p>

  </div>

  <!-- BUTTERFLIES -->

<div class="butterfly b1">
    <span>🦋</span>
</div>

<div class="butterfly b2">
    <span>🦋</span>
</div>

<div class="butterfly b3">
    <span>🦋</span>
</div>


<!-- FLOWER PETALS -->

<div class="petal p1">✿</div>

<div class="petal p2">✿</div>

<div class="petal p3">✿</div>

<!-- MINI SPARKS -->

<div class="spark s4">✦</div>

<div class="spark s5">✦</div>

<div class="spark s6">✦</div>

  <!-- Login Card -->

  <div class="login-card">

    <h2>
      For Dhanvi Bhat
    </h2>

    <h1>
      Only The Birthday
      Girl Can Enter
    </h1>

    <p class="subtitle">
      Enter your birthday to unlock your surprise 🌼
    </p>

    <div class="password-boxes">

      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">
      <input maxlength="1" type="password">

    </div>

    <button id="enterBtn">
      Enter
    </button>

    <p id="message"></p>

  </div>

  <!-- Confetti -->

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <audio id="popSound"
       preload="auto">

  <source src="music/popper.mp3"
          type="audio/mpeg">

</audio>

  <script src="login.js"></script>

</body>

</html>
