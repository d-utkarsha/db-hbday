<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>DB HBD 💛</title>

  <link rel="stylesheet"
        href="countdown.css">

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Cormorant+Garamond:wght@500;700&display=swap"
        rel="stylesheet">

</head>

<body>

  <!-- Background -->

  <div class="gradient-bg"></div>

  <!-- Ambient Glow -->

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <!-- Curves -->

  <div class="curve curve1"></div>
  <div class="curve curve2"></div>

  <!-- Side Streaks -->

  <div class="streak streak1"></div>
  <div class="streak streak2"></div>

  <!-- Hanging Stars -->

  <div class="hanging hanging1">
    <span>✦</span>
  </div>

  <div class="hanging hanging2">
    <span>✦</span>
  </div>

  <div class="hanging hanging3">
    <span>✦</span>
  </div>

  <!-- Dust -->

  <div class="dust d1"></div>
  <div class="dust d2"></div>
  <div class="dust d3"></div>
  <div class="dust d4"></div>
  <div class="dust d5"></div>
  <div class="dust d6"></div>

  <!-- Stars -->

  <div class="starry s1">✦</div>
  <div class="starry s2">✦</div>
  <div class="starry s3">✦</div>

  <!-- Mouse Glow -->

  <div class="mouse-blur"></div>

  <!-- Cursor Glow -->

  <div class="cursor-glow"></div>

  <!-- Main Content -->

  <div class="countdown-container">

    <!-- Countdown -->

    <h1 id="count">
      3
    </h1>

    <!-- Loader -->

    <div id="loadingBox">

      <div class="loader"></div>

      <p id="loadingText">
        Loading your surprise...
      </p>

    </div>

  </div>

  <audio id="bgMusic"
       loop>

  <source src="music/verification.mp3"
          type="audio/mpeg">

</audio>

  <script src="countdown.js"></script>

</body>

</html>
