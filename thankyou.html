<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>DB HBD 💛</title>

<link rel="stylesheet"
      href="thankyou.css">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&display=swap"
      rel="stylesheet">
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bonheur+Royale&family=Hubballi&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

<!-- EMAILJS -->

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

</head>

<body>

<!-- BACKGROUND -->

<div class="gradient-bg"></div>

<div class="streak streak1"></div>
<div class="streak streak2"></div>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="curve curve1"></div>
<div class="curve curve2"></div>

<div class="hanging hanging1">
    <span>✦</span>
</div>

<div class="hanging hanging2">
    <span>✦</span>
</div>

<div class="hanging hanging3">
    <span>✦</span>
</div>

<div class="dust d1"></div>
<div class="dust d2"></div>
<div class="dust d3"></div>
<div class="dust d4"></div>
<div class="dust d5"></div>
<div class="dust d6"></div>
<div class="dust d7"></div>
<div class="dust d8"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="starry s1">✦</div>
<div class="starry s2">✦</div>
<div class="starry s3">✦</div>

<div class="butterfly b1">
    <span>🦋</span>
</div>

<div class="butterfly b2">
    <span>🦋</span>
</div>

<div class="butterfly b3">
    <span>🦋</span>
</div>

<div class="petal p1">✿</div>
<div class="petal p2">✿</div>
<div class="petal p3">✿</div>

<div class="spark s4">✦</div>
<div class="spark s5">✦</div>
<div class="spark s6">✦</div>

<div class="mouse-blur"></div>

<div class="cursor-glow"></div>

<!-- ===================================
     SCENE 1
=================================== -->

<section id="thankYouScene">

    <div id="rightGroup">

    <h1 id="thankYouTitle">

        Thank You,

        <span id="nameLine">

            Dhanvi Bhat 💛

        </span>

    </h1>

    <p id="typewriterText"></p>

    <div id="signature">

        Made with 💛

        <br>

        <span>— Kanhaa</span>

    </div>

</div>

</section>

<!-- ===================================
     SCENE 2
=================================== -->

<section id="feedbackScene">

    <!-- LEFT -->

    <div class="feedbackPanel">

        <h2>

            Before You Leave...

        </h2>

        <p class="feedbackSub">

            I'd love to know what you felt 💛

        </p>

        <div class="ratingDisplay">

            <span id="ratingValue">

                10

            </span>

            / 10

        </div>

        <input type="range"
       min="0"
       max="10"
       step="0.1"
       value="3"
       id="ratingSlider">

        <textarea
        id="feedbackText"
        placeholder="Write something here..."></textarea>

        <button id="submitFeedback">

            Send Feedback 💛

        </button>

    </div>

    <!-- DIVIDER -->

    <div id="divider"></div>

</section>

<!-- ===================================
     FINAL SCENE
=================================== -->

<section id="finalScene">

    <h1 id="finalTitle">

        Happy Birthday

    </h1>

    <div id="finalSubTitle">

        Once Again 

    </div>

    <p>

        Thank you for being part
        of this little journey 💛

    </p>

</section>

<audio
id="thankyouMusic"
preload="auto"
loop>

    <source
    src="music/thankyou.mp3"
    type="audio/mpeg">

</audio>
<audio id="cutSound"
       preload="auto">

  <source src="music/popper.mp3"
          type="audio/mpeg">

</audio>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="thankyou.js"></script>

</body>
</html>
